name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/matchpulse-backend
            git pull origin main
            npm install --production
            pm2 restart matchpulse || pm2 start src/server.js --name matchpulse
            pm2 save
            echo "✅ Deployment complete at $(date)"
